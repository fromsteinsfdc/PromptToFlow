<template>
    <div class="slds-card ptf-compact slds-is-relative">
        <!-- Page header with clearly separated Open / New / Save actions -->
        <div class="slds-page-header slds-page-header_joined">
            <div class="slds-page-header__row">
                <div class="slds-page-header__col-title">
                    <div class="slds-media">
                        <div class="slds-media__figure">
                            <lightning-icon icon-name="utility:builder" size="small"></lightning-icon>
                        </div>
                        <div class="slds-media__body">
                            <div class="slds-page-header__name">
                                <div class="slds-page-header__name-title">
                                    <h1>
                                        <span class="slds-page-header__title">JSON Template Builder</span>
                                    </h1>
                                </div>
                            </div>
                            <p class="slds-page-header__name-meta">{statusLabel}</p>
                        </div>
                    </div>
                </div>
                <div class="slds-page-header__col-actions">
                    <div class="slds-page-header__controls">
                        <div class="slds-page-header__control">
                            <lightning-button-menu
                                alternative-text="Open saved configuration"
                                label="Open"
                                icon-name="utility:open_folder"
                                menu-alignment="right"
                                onselect={handleOpenConfiguration}
                            >
                                <template if:true={showConfigLoading}>
                                    <lightning-menu-item
                                        value="__loading__"
                                        label="Loading saved configurations…"
                                        disabled
                                    ></lightning-menu-item>
                                </template>
                                <template if:true={hasConfigurations}>
                                    <template for:each={openMenuItems} for:item="config">
                                        <lightning-menu-item
                                            key={config.id}
                                            value={config.id}
                                            label={config.name}
                                            checked={config.checked}
                                        ></lightning-menu-item>
                                    </template>
                                </template>
                                <template if:true={showConfigEmpty}>
                                    <lightning-menu-item
                                        value="__none__"
                                        label="No saved configurations yet"
                                        disabled
                                    ></lightning-menu-item>
                                </template>
                            </lightning-button-menu>
                        </div>
                        <div class="slds-page-header__control">
                            <lightning-button
                                label="New"
                                icon-name="utility:add"
                                onclick={handleNewConfiguration}
                            ></lightning-button>
                        </div>
                        <div class="slds-page-header__control">
                            <lightning-button
                                label="Save"
                                variant="brand"
                                icon-name="utility:save"
                                onclick={handleSaveConfiguration}
                                disabled={isSaving}
                            ></lightning-button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="slds-p-around_medium">
            <template if:true={showSetupBanner}>
                <div class="slds-notify slds-notify_alert slds-theme_alert-texture slds-theme_warning slds-m-bottom_medium" role="alert">
                    <span class="slds-assistive-text">warning</span>
                    <h2>{setupMessage}</h2>
                    <template if:true={canAutoAssignPermissionSet}>
                        <div class="slds-m-top_x-small">
                            <lightning-button
                                variant="brand"
                                label="Auto-assign setup permission set"
                                onclick={handleAutoAssignPermissionSet}
                            ></lightning-button>
                        </div>
                    </template>
                </div>
            </template>

            <!-- Identity fields -->
            <div class="slds-grid slds-wrap slds-gutters slds-m-bottom_x-small">
                <div class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12">
                    <lightning-input
                        label="Configuration Name"
                        value={configurationName}
                        onchange={handleConfigurationNameChange}
                        onblur={handleConfigurationNameBlur}
                        required
                    ></lightning-input>
                </div>
                <div class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12">
                    <lightning-input
                        label="Invocable Action Label"
                        value={invocableActionLabel}
                        onchange={handleInvocableActionLabelChange}
                        field-level-help="This is the label of the Flow action you will call to parse the JSON output from the prompt template into objects the Flow can use"
                        required
                    ></lightning-input>
                </div>
            </div>
            <p class="slds-text-body_small slds-text-color_weak slds-m-bottom_medium">{parserClassHelpText}</p>

            <!-- Objects as vertical tabs with an in-rail add button (Flow Decision style) -->
            <div class="slds-vertical-tabs ptf-vtabs">
                <div class="ptf-vtabs__rail">
                    <div class="ptf-vtabs__rail-header">
                        <span class="slds-text-title_caps">Objects</span>
                        <lightning-button-icon
                            icon-name="utility:add"
                            variant="border-filled"
                            size="small"
                            alternative-text="Add object"
                            title="Add object"
                            onclick={handleAddObjectTab}
                        ></lightning-button-icon>
                    </div>

                    <template if:true={hasSelectedObjects}>
                        <ul class="slds-vertical-tabs__nav ptf-vtabs__nav" role="tablist" aria-orientation="vertical">
                            <template for:each={navItems} for:item="navItem">
                                <li key={navItem.id} class={navItem.itemClass} role="presentation">
                                    <a
                                        class="slds-vertical-tabs__link"
                                        href="#"
                                        role="tab"
                                        data-id={navItem.id}
                                        aria-selected={navItem.ariaSelected}
                                        onclick={handleSelectTab}
                                    >
                                        <span class="slds-grid slds-grid_vertical-align-center slds-has-flexi-truncate">
                                            <template if:true={navItem.isConfigured}>
                                                <lightning-icon
                                                    icon-name={navItem.iconName}
                                                    size="x-small"
                                                    alternative-text={navItem.iconAlt}
                                                    title={navItem.iconAlt}
                                                    class="slds-m-right_x-small"
                                                ></lightning-icon>
                                            </template>
                                            <span class="slds-truncate" title={navItem.shortLabel}>{navItem.shortLabel}</span>
                                        </span>
                                        <template if:true={navItem.showError}>
                                            <lightning-icon
                                                icon-name="utility:error"
                                                variant="error"
                                                size="xx-small"
                                                alternative-text="This object is incomplete"
                                                title="Select an object and at least one field"
                                                class="slds-col_bump-left"
                                            ></lightning-icon>
                                        </template>
                                        <template if:false={navItem.showError}>
                                            <template if:true={navItem.isConfigured}>
                                                <span class="slds-badge slds-col_bump-left">{navItem.selectedCount}</span>
                                            </template>
                                        </template>
                                    </a>
                                </li>
                            </template>
                        </ul>
                    </template>
                    <template if:false={hasSelectedObjects}>
                        <p class="slds-p-around_small slds-text-body_small slds-text-color_weak">
                            Click + to add your first object.
                        </p>
                    </template>
                </div>

                <div class="slds-vertical-tabs__content slds-show ptf-vtabs__content" role="tabpanel">
                    <template if:true={activeObject}>
                        <!-- Unconfigured tab: choose which object this represents -->
                        <template if:false={activeObject.isConfigured}>
                            <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-start">
                                <div class="slds-grow slds-p-right_small">
                                    <lightning-combobox
                                        label="Object"
                                        data-id={activeObject.id}
                                        value={activeObject.apiName}
                                        options={availableObjectOptions}
                                        onchange={handleObjectPicked}
                                        placeholder="Search objects…"
                                        required
                                    ></lightning-combobox>
                                    <p class="slds-text-body_small slds-text-color_weak slds-m-top_xx-small">
                                        Pick the object whose fields this part of the response should contain.
                                    </p>
                                </div>
                                <lightning-button-icon
                                    icon-name="utility:delete"
                                    variant="border-filled"
                                    alternative-text="Remove object"
                                    title="Remove object"
                                    data-id={activeObject.id}
                                    onclick={handleRemoveObject}
                                ></lightning-button-icon>
                            </div>
                        </template>

                        <!-- Configured tab: collection toggle + field picker -->
                        <template if:true={activeObject.isConfigured}>
                            <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-start slds-m-bottom_small">
                                <div>
                                    <h3 class="slds-text-heading_small">{activeObject.label}</h3>
                                    <span class="slds-badge slds-m-top_xx-small">{activeObject.selectedCount} fields selected</span>
                                </div>
                                <div class="slds-grid slds-grid_vertical-align-start">
                                    <lightning-input
                                        type="toggle"
                                        label="Collection (array)"
                                        message-toggle-active="Array"
                                        message-toggle-inactive="Single record"
                                        data-id={activeObject.id}
                                        checked={activeObject.isCollection}
                                        onchange={handleCollectionToggle}
                                        class="slds-m-right_small"
                                    ></lightning-input>
                                    <lightning-button-icon
                                        icon-name="utility:delete"
                                        variant="border-filled"
                                        alternative-text="Remove object"
                                        title="Remove object"
                                        data-id={activeObject.id}
                                        onclick={handleRemoveObject}
                                    ></lightning-button-icon>
                                </div>
                            </div>

                            <template if:true={activeObject.isLoading}>
                                <lightning-spinner size="small" alternative-text="Loading fields"></lightning-spinner>
                            </template>
                            <template if:false={activeObject.isLoading}>
                                <lightning-input
                                    type="search"
                                    label="Filter fields"
                                    variant="label-hidden"
                                    placeholder="Filter available fields…"
                                    value={activeObject.searchTerm}
                                    data-id={activeObject.id}
                                    onchange={handleFieldSearch}
                                    class="slds-m-bottom_x-small"
                                ></lightning-input>
                                <lightning-dual-listbox
                                    name="fields"
                                    label="Fields"
                                    source-label="Available"
                                    selected-label="Selected"
                                    options={activeFieldOptions}
                                    value={activeObject.selectedFields}
                                    data-id={activeObject.id}
                                    onchange={handleFieldSelection}
                                    size="7"
                                ></lightning-dual-listbox>
                            </template>
                        </template>
                    </template>

                    <template if:false={activeObject}>
                        <div class="slds-align_absolute-center slds-text-color_weak ptf-vtabs__empty">
                            Click + to add an object and start building your template.
                        </div>
                    </template>
                </div>
            </div>

            <!-- Collapsible JSON preview -->
            <div class="slds-m-top_medium">
                <lightning-button
                    variant="base"
                    label={previewToggleLabel}
                    icon-name="utility:preview"
                    onclick={togglePreview}
                ></lightning-button>
                <template if:true={showPreview}>
                    <div class="slds-m-top_x-small">
                        <lightning-textarea label="Generated JSON" value={jsonOutput} readonly></lightning-textarea>
                        <div class="slds-m-top_x-small">
                            <lightning-button label="Copy Output" icon-name="utility:copy" onclick={handleCopyOutput}></lightning-button>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <template if:true={isBusy}>
            <div class="ptf-saving">
                <lightning-spinner size="medium" variant="brand" alternative-text="Loading"></lightning-spinner>
            </div>
        </template>
    </div>
</template>
